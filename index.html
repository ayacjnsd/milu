  h1,h2,h3,.font-display{font-family:'Manrope',sans-serif;}
  ::-webkit-scrollbar{width:0px;height:0px;}
  .brand-bg{background-color:var(--brand);}
  .brand-text{color:var(--brand);}
  .brand-dark-bg{background-color:var(--brand-dark);}
  .brand-light-bg{background-color:var(--brand-light);}
  .accent-bg{background-color:var(--accent);}
  .accent-text{color:var(--accent);}
  .accent-light-bg{background-color:var(--accent-light);}
  .accent2-bg{background-color:var(--accent2);}
  .accent2-text{color:var(--accent2);}
  .accent2-light-bg{background-color:var(--accent2-light);}
  .danger-bg{background-color:var(--danger);}
  .danger-text{color:var(--danger);}
  .danger-light-bg{background-color:var(--danger-light);}
  .progress-track{background:#EAE7F2;border-radius:99px;height:7px;overflow:hidden;}
  .progress-fill{background:linear-gradient(90deg,var(--brand),var(--accent));height:100%;border-radius:99px;transition:width .5s ease;}
  .mood-btn{transition:all .2s ease;}
  .mood-btn.mood-selected{transform:scale(1.18);filter:drop-shadow(0 3px 6px rgba(253,113,24,.4));}
  .bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;flex:1;height:100%;}
  .bar-fill{width:60%;border-radius:6px 6px 3px 3px;background:#E4E1F0;transition:height .4s ease;min-height:4px;}
  .bar-fill.bar-today{background:linear-gradient(180deg,var(--accent),var(--brand));}
  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes popIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
  .shake{animation:shakeMap .45s ease;}
  @keyframes shakeMap{
    0%{transform:translateX(0);}
    20%{transform:translateX(-6px) rotate(-0.5deg);}
    40%{transform:translateX(6px) rotate(0.5deg);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
    100%{transform:translateX(0);}
  }
  .dot-bounce{display:inline-flex;align-items:center;gap:4px;}
  .dot-bounce span{width:7px;height:7px;border-radius:50%;background:var(--brand);display:inline-block;animation:dotBounce 1.2s infinite ease-in-out both;}
  .dot-bounce span:nth-child(1){animation-delay:-0.32s;}
  .dot-bounce span:nth-child(2){animation-delay:-0.16s;}
  @keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:.5;}40%{transform:scale(1);opacity:1;}}
  .scrollarea{scrollbar-width:none;}
  .accordion-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
  .accordion-body.open{max-height:600px;}
  input[type="range"]{-webkit-appearance:none;height:6px;border-radius:6px;background:#E2E8F0;}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);cursor:pointer;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  select, input{font-family:'Inter',sans-serif;}
  .tab-active-indicator{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:28px;height:3px;border-radius:99px;background:var(--brand);}

    content: {
      ru: "Интернет открывает огромные возможности, но требует осторожности. Никогда не отправляй личные фото, адрес, номер школы или пароли даже тем, кого хорошо знаешь онлайн. Используй разные надёжные пароли для разных аккаунтов и включай двухфакторную аутентификацию. Если незнакомец в сети просит встречу, деньги или интимные фото — это тревожный сигнал: прекрати общение и расскажи взрослому, которому доверяешь. Проверяй настройки приватности в соцсетях: закрытый профиль защищает от нежелательного внимания. Кибербуллинг — это тоже насилие: сохраняй скриншоты, блокируй обидчика и сообщай модераторам платформы или взрослым. Помни: то, что публикуется онлайн, может остаться там навсегда, поэтому думай, прежде чем постить.",

    content: {

/* --- Age bands & progress helpers --- */
function getAgeBand(age) {
  if (age <= 14) return '12-14';
  if (age <= 16) return '15-16';
  return '17-18';
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function logActivity(type) {
  state.activityLog.push({ date: todayStr(), type: type });
  saveActivityLog();
}
function getWeekDates() {
  const now = new Date();
  const day = now.getDay(); // 0 = Sunday
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().slice(0, 10));
  }
  return dates;
}
function computeWeeklyActivity() {
  const weekDates = getWeekDates();
  const counts = weekDates.map(d => state.activityLog.filter(a => a.date === d).length);
  return { weekDates, counts };
}
function computeStreak() {
  let streak = 0;
  let cursor = new Date();
  const activeDates = new Set(state.activityLog.map(a => a.date));
  while (true) {
    const dStr = cursor.toISOString().slice(0, 10);
    if (activeDates.has(dStr)) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}
function computeModuleProgress(moduleKey) {
  const band = getAgeBand(state.user.age);
  const lessons = (MODULES[moduleKey].lessons && MODULES[moduleKey].lessons[band]) || [];
  const completed = lessons.filter(l => state.completedLessonIds.includes(l.id)).length;
  return { completed: completed, total: lessons.length, percent: lessons.length ? Math.round((completed / lessons.length) * 100) : 0 };
}
function computeSecurityLevel() {
  const band = getAgeBand(state.user.age);
  let totalLessons = 0;
  let totalCompleted = 0;
  Object.keys(MODULES).forEach(key => {
    const lessons = (MODULES[key].lessons && MODULES[key].lessons[band]) || [];
    totalLessons += lessons.length;
    totalCompleted += lessons.filter(l => state.completedLessonIds.includes(l.id)).length;
  });
  return totalLessons ? Math.round((totalCompleted / totalLessons) * 100) : 0;
}
function computeSkillMastery() {
  const band = getAgeBand(state.user.age);
  const percents = Object.keys(MODULES).map(key => computeModuleProgress(key).percent);
  const sum = percents.reduce((a, b) => a + b, 0);
  return percents.length ? Math.round(sum / percents.length) : 0;
}

function bindAuthEvents() {
  document.getElementById('btn-lang-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('lang-dropdown').classList.toggle('hidden');
  });
  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.addEventListener('click', () => {
      state.currentLanguage = btn.dataset.lang;
      saveLang();
      render();
    });
  });
  document.addEventListener('click', () => {
    const dd = document.getElementById('lang-dropdown');
    if (dd) dd.classList.add('hidden');
  }, { once: true });

  document.getElementById('btn-mode-signin').addEventListener('click', () => { state.authMode = 'signin'; render(); });
  document.getElementById('btn-mode-signup').addEventListener('click', () => { state.authMode = 'signup'; render(); });
  document.getElementById('btn-toggle-auth-mode').addEventListener('click', () => {
    state.authMode = state.authMode === 'signup' ? 'signin' : 'signup';
    render();
  });
  document.getElementById('btn-toggle-pass').addEventListener('click', () => {
    state.showPassword = !state.showPassword;
    render();
  });

  if (state.authMode === 'signup') {
    document.getElementById('input-country').addEventListener('change', (e) => {
      state.user.country = e.target.value;
      state.user.city = GEO[e.target.value].cities[0];
      render();
    });
  }

  document.getElementById('auth-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const nickname = document.getElementById('input-nickname').value.trim();
    const password = document.getElementById('input-password').value.trim();
    const errBox = document.getElementById('auth-error');

    if (!nickname || !password) {
      errBox.textContent = t('fillAllFields');
      errBox.classList.remove('hidden');
      return;
    }

    state.user.nickname = nickname;
    state.user.password = password;

    if (state.authMode === 'signup') {
      state.user.age = parseInt(document.getElementById('input-age').value, 10);
      state.user.country = document.getElementById('input-country').value;
      state.user.city = document.getElementById('input-city').value;
    }

    state.user.authenticated = true;
    saveUser();
    state.chatHistory = [{ role: 'assistant', content: t('aiWelcome') }];
    render();
  });
}

async function callOpenAI(userText) {
  const crisis = getCrisisInfo();
  const langName = LANG_LABELS[state.currentLanguage];
  const systemPrompt = `You are "milu", an empathetic, highly secure digital mentor for adolescents (ages 12-18) in Central Asia (Kazakhstan, Kyrgyzstan, Uzbekistan, Tajikistan, Turkmenistan). You provide supportive, age-appropriate guidance on physical health, mental wellbeing, digital safety, and financial literacy. You are warm, non-judgmental, culturally sensitive, and never share the user's information with anyone. You always answer in ${langName}, matching the user's language.

The user you are speaking with is ${state.user.age} years old, located in ${state.user.city}, ${state.user.country}.

CRITICAL SAFETY PROTOCOL: If the user's message contains any indication of self-harm, suicidal ideation, severe depression, or acute crisis, you MUST immediately and clearly provide this emergency information as the first part of your response, in ${langName}: the national helpline number "${crisis.national}" (${crisis.text}), and this local resource: "${crisis.local}". Encourage them to reach out to a trusted adult or call immediately. Do not lecture; be warm and direct. After providing this information, offer brief, gentle emotional support.

For all other topics, give clear, accurate, encouraging, and age-appropriate answers. Keep responses concise (3-6 sentences) unless the user asks for more detail. Never provide medical diagnoses, legal advice, or explicit content. Always encourage talking to trusted adults, teachers, or professionals for serious concerns.`;

  const messages = [{ role: 'system', content: systemPrompt }];
  state.chatHistory.forEach(m => {
    if (m.role === 'user' || m.role === 'assistant') {
      messages.push({ role: m.role, content: m.content });
    }
  });

  let response;
  try {
    response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + state.openaiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: messages,
        max_tokens: 500,
        temperature: 0.7
      })
    });
  } catch (networkErr) {
    throw new Error(t('errorNetwork'));
  }

  if (!response.ok) {
    if (response.status === 401 || response.status === 403) {
      throw new Error(t('errorAuth'));
    }
    if (response.status === 429) {
      throw new Error(t('errorRate'));
    }
    let detail = '';
    try {
      const errJson = await response.json();
      detail = errJson.error && errJson.error.message ? errJson.error.message : '';
    } catch (e) {}
    throw new Error(t('errorGeneric') + (detail ? ' (' + detail + ')' : ''));
  }

  const data = await response.json();
  if (!data.choices || !data.choices[0] || !data.choices[0].message) {
    throw new Error(t('errorGeneric'));
  }
  return data.choices[0].message.content.trim();
}

async function generateLessonContent(moduleKey, band, lessonTitle) {

  let response;
  try {
    response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + state.openaiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: `Generate the lesson now: "${lessonTitle}"` }
        ],
        max_tokens: 500,
        temperature: 0.7
      })
    });
  } catch (networkErr) {
    throw new Error(t('errorNetwork'));
  }

  if (!response.ok) {
    if (response.status === 401 || response.status === 403) throw new Error(t('errorAuth'));
    if (response.status === 429) throw new Error(t('errorRate'));
    let detail = '';
    try {
      const errJson = await response.json();
      detail = errJson.error && errJson.error.message ? errJson.error.message : '';
    } catch (e) {}
    throw new Error(t('errorGeneric') + (detail ? ' (' + detail + ')' : ''));
  }

  const data = await response.json();
  if (!data.choices || !data.choices[0] || !data.choices[0].message) {
    throw new Error(t('errorGeneric'));
  }
  return data.choices[0].message.content.trim();
}

      const title = btn.dataset.title;
      state.lessonError = '';

      if (state.lessonContent[lessonId]) {
        state.activeLessonId = lessonId;
        render();
        return;
      }

      const band = getAgeBand(state.user.age);
      state.lessonLoadingId = lessonId;
      render();

      try {
        const content = await generateLessonContent(state.activeModal, band, title);
        state.lessonContent[lessonId] = content;
        saveLessonContent();
        if (!state.completedLessonIds.includes(lessonId)) {
          state.completedLessonIds.push(lessonId);
          saveCompletedLessons();
          logActivity('lesson');
        }
        state.activeLessonId = lessonId;
      } catch (err) {
        state.lessonError = err.message || t('errorGeneric');
      }
      state.lessonLoadingId = null;
      render();
    });
  });
}

/* -------------------------------------------------------------------------

function renderForumTab() {

        <textarea id="forum-question-input" rows="3" placeholder="${t('questionPlaceholder')}"

        <select id="forum-category-select" class="w-full bg-slate-100 rounded-2xl px-4 py-3 text-sm text-slate-950 font-medium outline-none appearance-none">
          <option value="mental">${categoryMeta.mental.label}</option>
          <option value="health">${categoryMeta.health.label}</option>
          <option value="safety">${categoryMeta.safety.label}</option>
          <option value="other">${categoryMeta.other.label}</option>
        </select>
        <button type="submit" class="w-full brand-bg text-white font-bold py-3.5 rounded-2xl active:scale-[0.98] transition-all">${t('submit')}</button>
      </form>
    </div>

    <div id="forum-toast" class="hidden brand-light-bg brand-text text-sm font-bold rounded-2xl px-4 py-3 mb-4 text-center"></div>

    <div class="space-y-4 pb-4">
      ${state.forumQuestions.slice().reverse().map(q => {
        const cat = categoryMeta[q.category] || categoryMeta.other;
        return `
        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden fade-in">
          <div class="h-1.5 ${cat.color}"></div>
          <div class="p-5">
            <div class="flex items-center justify-between mb-2.5">
              <span class="${cat.bg} ${cat.text} text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wide">${cat.label}</span>
              ${q.answered
                ? `<span class="text-[10px] font-bold text-emerald-600 flex items-center gap-1"><i class="fa-solid fa-circle-check"></i> ${t('expertAnswer')}</span>`
                : `<span class="text-[10px] font-bold text-amber-600 flex items-center gap-1"><i class="fa-solid fa-clock"></i> ${t('pending')}</span>`}
            </div>
            <p class="text-slate-950 font-semibold text-sm leading-snug mb-3">${escapeHtml(q.text_ru)}</p>
            ${q.answered ? `
              <div class="${cat.bg} rounded-2xl p-3.5">
                <p class="text-slate-800 text-sm leading-relaxed mb-2">${escapeHtml(q.answer)}</p>
                <p class="${cat.text} text-xs font-bold flex items-center gap-1.5"><i class="fa-solid fa-certificate"></i> ${escapeHtml(q.expert)}</p>
              </div>
            ` : `
              <div class="bg-slate-50 rounded-2xl p-3.5 flex items-center gap-2">
                <i class="fa-solid fa-hourglass-half text-slate-400"></i>
                <p class="text-slate-500 text-xs font-medium">${t('noAnswerYet')}</p>
              </div>
            `}

        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function bindForumEvents() {
  document.getElementById('forum-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('forum-question-input');
    const category = document.getElementById('forum-category-select').value;
    const text = input.value.trim();
    if (!text) return;

    state.forumQuestions.push({
      id: state.nextQuestionId++,
      text_ru: text,
      category: category,
      answered: false,
      answer: '',
      expert: ''
    });
    logActivity('forum');

    render();
    const toast = document.getElementById('forum-toast');
    if (toast) {
      toast.textContent = t('questionPosted');
      toast.classList.remove('hidden');
      setTimeout(() => { toast.classList.add('hidden'); }, 2500);
    }
  });
}

          ${(state.user.nickname || '?').charAt(0).toUpperCase()}
        </div>
        <div>
          <p class="text-white font-display font-800 text-lg">${state.user.nickname}</p>
          <p class="text-white/70 text-xs">${state.user.age} ${t('years')} · ${state.user.city}, ${state.user.country}</p>

          <p class="text-white/70 text-[10px] font-medium leading-tight">${t('questionsAsked')}</p>
        </div>
        <div class="bg-white/15 backdrop-blur rounded-2xl p-3">
          <p class="text-white font-display font-800 text-lg">${state.registeredEvents.length}</p>
          <p class="text-white/70 text-[10px] font-medium leading-tight">${t('eventsRegistered')}</p>

          <p class="text-white font-display font-800 text-lg">${computeSecurityLevel()}%</p>

        return `
        <div class="bg-white rounded-3xl border border-slate-100 p-4 shadow-sm flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl ${cat} flex items-center justify-center shrink-0">
            <i class="fa-solid ${ev.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-slate-950 font-bold text-sm leading-snug mb-1">${escapeHtml(ev.title_ru)}</p>
            <div class="flex items-center flex-wrap gap-1.5">
              <span class="text-slate-500 text-xs font-medium">${ev.date} · ${ev.spots} ${t('spotsLeft')}</span>
              <span class="${orgColor} text-[9px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide">${ev.organizer}</span>

      <input id="api-key-input" type="text" value="${state.openaiKey}"
        class="w-full bg-slate-100 rounded-2xl px-4 py-3 text-xs text-slate-950 font-mono outline-none focus:ring-2 focus:ring-[var(--brand)] mb-3">
      <button id="btn-save-key" class="w-full accent-bg text-white font-bold py-3.5 rounded-2xl active:scale-[0.98] transition-all">${t('saveChanges')}</button>
      <div id="key-saved-toast" class="hidden brand-light-bg brand-text text-sm font-bold rounded-2xl px-4 py-2.5 text-center mt-3"></div>
    </div>

      <i class="fa-solid fa-right-from-bracket"></i> ${t('logout')}
    </button>
  </div>`;
}

function bindCalendarEvents() {
  document.querySelectorAll('.event-register-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.event;
      if (!state.registeredEvents.includes(id)) {
        state.registeredEvents.push(id);
        saveEvents();
        logActivity('event');
        render();
      }
    });
  });

  document.getElementById('profile-country').addEventListener('change', (e) => {
    const newCountry = e.target.value;
    const citySelect = document.getElementById('profile-city');
    citySelect.innerHTML = GEO[newCountry].cities.map(c => `<option value="${c}">${c}</option>`).join('');
  });

  document.getElementById('btn-save-profile').addEventListener('click', () => {
    state.user.age = parseInt(document.getElementById('profile-age').value, 10);
    state.user.country = document.getElementById('profile-country').value;
    state.user.city = document.getElementById('profile-city').value;
    state.currentLanguage = document.getElementById('profile-language').value;
    state.mapCity = GEO[state.user.country].cities.includes(state.mapCity) ? state.mapCity : state.user.city;
    saveUser();
    saveLang();
    render();
    setTimeout(() => {
      const toast = document.getElementById('profile-saved-toast');
      if (toast) {
        toast.textContent = t('saved');
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2000);
      }
    }, 30);
  });

  document.getElementById('btn-save-key').addEventListener('click', () => {
    const val = document.getElementById('api-key-input').value.trim();
    if (val) {
      state.openaiKey = val;
      saveKey();
      const toast = document.getElementById('key-saved-toast');
      toast.textContent = t('saved');
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    state.user.authenticated = false;
    state.chatHistory = [];
    render();
  });
}

/* -------------------------------------------------------------------------
   17. INITIAL RENDER
------------------------------------------------------------------------- */
if (state.user.authenticated && state.chatHistory.length === 0) {
  state.chatHistory = [{ role: 'assistant', content: t('aiWelcome') }];
}
render();

</script>
